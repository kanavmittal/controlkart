name: Build & Deploy

# Builds Docker images in CI and pushes them to GHCR, then tells Dokploy to pull
# & redeploy. The VPS never builds — it only pulls finished images (no more
# build-OOM taking down the panel). Each app rebuilds only when its files change.

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      build_all:
        description: "Build & deploy both apps regardless of changed paths"
        type: boolean
        default: true

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  OWNER: kanavmittal # GHCR namespace (must be lowercase)
  MEDUSA_APP_ID: 2xOxyyW_3lD7SVJJ9NKjK
  STOREFRONT_APP_ID: P7itsf66-VfKT3t6nMjYZ
  # NEXT_PUBLIC_* are inlined into the storefront bundle at build time (public values).
  NEXT_PUBLIC_MEDUSA_BACKEND_URL: https://api.controlkart.com
  NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY: pk_7afdeb02f3fbb75a6ed68650163998815210776a222fa107ceb290b613a20f74
  NEXT_PUBLIC_BASE_URL: https://controlkart.com

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      medusa: ${{ steps.f.outputs.medusa }}
      storefront: ${{ steps.f.outputs.storefront }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: f
        with:
          filters: |
            medusa:
              - 'apps/medusa/**'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'package.json'
              - '.npmrc'
            storefront:
              - 'apps/storefront/**'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'package.json'
              - '.npmrc'

  medusa:
    needs: changes
    if: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.medusa == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/medusa/Dockerfile
          target: production
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/controlkart-medusa:latest
            ${{ env.REGISTRY }}/${{ env.OWNER }}/controlkart-medusa:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Trigger Dokploy deploy (medusa)
        continue-on-error: true # no-op until DOKPLOY_* secrets + registry source are wired
        run: |
          curl -fsSL -X POST "${{ secrets.DOKPLOY_URL }}/api/application.deploy" \
            -H "x-api-key: ${{ secrets.DOKPLOY_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{\"applicationId\":\"${MEDUSA_APP_ID}\"}"

  storefront:
    needs: changes
    if: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.storefront == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/storefront/Dockerfile
          target: production
          push: true
          build-args: |
            NEXT_PUBLIC_MEDUSA_BACKEND_URL=${{ env.NEXT_PUBLIC_MEDUSA_BACKEND_URL }}
            NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY=${{ env.NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY }}
            NEXT_PUBLIC_BASE_URL=${{ env.NEXT_PUBLIC_BASE_URL }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/controlkart-storefront:latest
            ${{ env.REGISTRY }}/${{ env.OWNER }}/controlkart-storefront:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Trigger Dokploy deploy (storefront)
        continue-on-error: true # no-op until DOKPLOY_* secrets + registry source are wired
        run: |
          curl -fsSL -X POST "${{ secrets.DOKPLOY_URL }}/api/application.deploy" \
            -H "x-api-key: ${{ secrets.DOKPLOY_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{\"applicationId\":\"${STOREFRONT_APP_ID}\"}"
